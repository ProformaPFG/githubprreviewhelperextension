<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Code Review Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #24292f;
      background-color: #ffffff;
    }

    .container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      gap: 8px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .header-icon {
      width: 20px;
      height: 20px;
      background-color: #238636;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 12px;
    }

    .status {
      padding: 12px;
      background-color: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #3fb950;
    }

    .status-indicator.idle {
      background-color: #79c0ff;
    }

    .status-indicator.error {
      background-color: #f85149;
    }

    .status-text {
      font-size: 12px;
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    button {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #d0d7de;
      background-color: #f6f8fa;
      color: #24292f;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background-color 0.2s, border-color 0.2s;
    }

    button:hover {
      background-color: #eaeef2;
      border-color: #d0d7de;
    }

    button.primary {
      background-color: #238636;
      color: #ffffff;
      border-color: #1a7f37;
    }

    button.primary:hover {
      background-color: #2ea043;
      border-color: #238636;
    }

    .divider {
      height: 1px;
      background-color: #e5e7eb;
      margin: 16px 0;
    }

    .quick-settings {
      margin-top: 16px;
    }

    .quick-settings h3 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #656d76;
      margin-bottom: 8px;
    }

    .setting-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .setting-item:hover {
      background-color: #f6f8fa;
    }

    .setting-item input[type="checkbox"] {
      cursor: pointer;
    }

    .setting-label {
      flex: 1;
      font-size: 12px;
    }

    .not-on-pr {
      padding: 16px;
      text-align: center;
      color: #656d76;
    }

    .not-on-pr p {
      margin-bottom: 8px;
    }

    a {
      color: #0969da;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer-links {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
      font-size: 11px;
    }

    .loading {
      text-align: center;
      padding: 8px;
      color: #656d76;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #238636;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 4px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">✓</div>
      <h1>Code Review</h1>
    </div>

    <div id="content">
      <!-- Content will be injected here by popup.js -->
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
